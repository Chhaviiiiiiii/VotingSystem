spring.application.name=VotingSystem

server.port=${PORT:8081}

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/votingdb}
spring.data.mongodb.database=votingdb

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.dev-fallback=${APP_MAIL_DEV_FALLBACK:false}

app.base-url=${APP_BASE_URL:http://localhost:8081}
openrouter.api.key=${OPENROUTER_API_KEY:}
openrouter.model=openrouter/free