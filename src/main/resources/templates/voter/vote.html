<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>(function(){const saved=localStorage.getItem('theme');const theme=saved?saved:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',theme);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast Vote | VOTE INDIA</title>
    <!-- Bootstrap & Custom Design stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link th:href="@{/css/design-system.css}" rel="stylesheet">
    <link th:href="@{/css/app-shell.css}" rel="stylesheet">
    <style>
        .vote-cand-card {
            border: 1px solid var(--border);
            background-color: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .btn-check:checked + .vote-cand-card {
            border-color: var(--brand-green);
            background-color: rgba(22, 163, 74, 0.05);
            box-shadow: 0 0 0 3px rgba(22, 163, 74, 0.1);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="app-sidebar">
            <div class="sidebar-brand">
                <span class="title">VOTE INDIA</span>
                <div class="subtitle">Voter Portal</div>
            </div>
            <ul class="sidebar-menu">
                <li><a th:href="@{/voter/dashboard}" class="sidebar-link active">Dashboard</a></li>
                <li><a th:href="@{/voter/candidates}" class="sidebar-link">Candidates Directory</a></li>
                <li><a th:href="@{/voter/ai-assistant}" class="sidebar-link">AI Assistant</a></li>
                <li><a th:href="@{/voter/results}" class="sidebar-link">Election Results</a></li>
                <li><a th:href="@{/voter/profile}" class="sidebar-link">My Profile</a></li>
            </ul>
            <div class="mt-auto pt-3 border-top" style="border-color: rgba(255,255,255,0.08) !important;">
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100 rounded-1">Logout</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="app-content">
            <header class="app-header">
                <button class="btn btn-dark d-lg-none" id="sidebarToggle">☰ Menu</button>
                <span class="header-welcome">Cast Your Vote</span>
            </header>

            <main class="app-body">
                <div class="mb-4">
                    <h2 class="display-6 m-0">Secure Ballot</h2>
                    <p class="text-secondary mb-0" th:if="${activeElection != null}" th:text="${'Election Event: ' + activeElection.title}"></p>
                </div>

                <!-- Error alerts -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <form th:action="@{/voter/vote}" method="post">
                    <div class="row g-3">
                        <div class="col-md-6" th:each="candidate : ${candidates}">
                            <input type="radio" name="candidateId" th:value="${candidate.id}" class="btn-check" th:id="${'cand-' + candidate.id}" autocomplete="off" required>
                            <label class="vote-cand-card w-100" th:for="${'cand-' + candidate.id}">
                                <div>
                                    <h3 class="h5 mb-1" th:text="${candidate.name}"></h3>
                                    <span class="badge-editorial badge-editorial-saffron mb-2" th:text="${candidate.party}">Party</span>
                                    
                                    <div th:if="${candidate.symbol != null && candidate.symbol.startsWith('data:image')}" class="mt-2">
                                        <img th:src="${candidate.symbol}" alt="Symbol" style="width: 40px; height: 40px; object-fit: contain;">
                                    </div>
                                    <div th:if="${candidate.symbol != null && !candidate.symbol.startsWith('data:image')}" class="small text-muted" th:text="${'Symbol: ' + candidate.symbol}"></div>
                                </div>
                                
                                <span class="badge-editorial badge-editorial-muted px-3">Select</span>
                            </label>
                        </div>
                    </div>
                    
                    <div class="text-center mt-5">
                        <p class="small text-muted mb-3">⚠️ Your selection is final and cannot be modified after submission.</p>
                        <button type="submit" class="btn-editorial-primary px-5 py-3 fs-5">Submit Secure Ballot &rarr;</button>
                    </div>
                </form>
            </main>
        </div>
    </div>

    <!-- Hidden Footer reference to load theme styles globally -->
    <div th:replace="~{fragments/footer :: footer}" style="display: none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app-ui.js}"></script>
</body>
</html>
