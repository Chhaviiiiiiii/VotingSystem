<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cast Vote | AI Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/voter/dashboard}">Online Voting Panel</a>
        <div class="d-flex">
            <a th:href="@{/voter/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Cast Your Vote</h2>
    <h5 class="text-muted" th:if="${activeElection != null}" th:text="${'Election: ' + activeElection.title}"></h5>
    <hr>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/voter/vote}" method="post">
        <div class="row">
            <div class="col-md-6 mb-3" th:each="candidate : ${candidates}">
                <div class="card shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h5 th:text="${candidate.name}"></h5>
                            <span class="text-muted" th:text="${'Party: ' + candidate.party + ' | Symbol: ' + (candidate.symbol != null && !candidate.symbol.startsWith('data:image') ? candidate.symbol : 'Uploaded Photo')}"></span>
                            <div th:if="${candidate.symbol != null && candidate.symbol.startsWith('data:image')}" class="mt-1">
                                <img th:src="${candidate.symbol}" alt="Symbol" style="width: 45px; height: 45px; object-fit: contain;">
                            </div>
                        </div>
                        <div>
                            <input type="radio" name="candidateId" th:value="${candidate.id}" class="btn-check" th:id="${'cand-' + candidate.id}" autocomplete="off" required>
                            <label class="btn btn-outline-success" th:for="${'cand-' + candidate.id}">Select</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="d-grid mt-4 col-md-4 mx-auto">
            <button type="submit" class="btn btn-primary btn-lg">Submit Vote</button>
        </div>
    </form>
</div>
</body>
</html>
