<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidates | AI Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/voter/dashboard}">Online Voting Panel</a>
        <div class="d-flex">
            <a th:href="@{/voter/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Candidates List</h2>
    <hr>
    <div class="row">
        <div class="col-md-4" th:each="candidate : ${candidates}">
            <div class="card mb-4 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${candidate.name}"></h5>
                    <p class="card-text"><strong>Party:</strong> <span th:text="${candidate.party}"></span></p>
                    <p class="card-text"><strong>Symbol:</strong> 
                        <span th:if="${candidate.symbol != null && !candidate.symbol.startsWith('data:image')}" th:text="${candidate.symbol}"></span>
                        <img th:if="${candidate.symbol != null && candidate.symbol.startsWith('data:image')}" th:src="${candidate.symbol}" alt="Symbol" style="width: 40px; height: 40px; object-fit: contain;">
                    </p>
                    <a th:href="@{/voter/candidates/{id}(id=${candidate.id})}" class="btn btn-primary btn-sm">View Details & AI manifesto summary</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
