<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closed Election Results | AI Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/voter/dashboard}">Online Voting Panel</a>
        <div class="d-flex">
            <a th:href="@{/voter/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Closed Election Results</h2>
    <hr>
    
    <div th:if="${closedElections.isEmpty()}" class="alert alert-info">
        No elections have been closed yet. Results will be published here once an active election is closed.
    </div>

    <div th:each="election : ${closedElections}" class="card mb-4 shadow-sm">
        <div class="card-header bg-dark text-white" th:text="${election.title}"></div>
        <div class="card-body">
            <table class="table table-bordered table-striped">
                <thead>
                    <tr>
                        <th>Candidate Name</th>
                        <th>Party</th>
                        <th>Votes</th>
                        <th>Percentage</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="res : ${resultsMap.get(election.id)}">
                        <td th:text="${res.name}"></td>
                        <td th:text="${res.party}"></td>
                        <td th:text="${res.votes}"></td>
                        <td th:text="${#numbers.formatDecimal(res.percentage, 1, 2) + '%'}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
