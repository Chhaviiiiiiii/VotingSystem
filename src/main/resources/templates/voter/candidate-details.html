<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Details | AI Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/voter/dashboard}">Online Voting Panel</a>
        <div class="d-flex">
            <a th:href="@{/voter/candidates}" class="btn btn-outline-light btn-sm me-2">Back to Candidates</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow border-0">
        <div class="card-body">
            <h2 class="card-title" th:text="${candidate.name}"></h2>
            <h6 class="card-subtitle mb-3 text-muted" th:text="${'Party: ' + candidate.party + ' | Symbol: ' + (candidate.symbol != null && !candidate.symbol.startsWith('data:image') ? candidate.symbol : 'Uploaded Photo')}"></h6>
            
            <div th:if="${candidate.symbol != null && candidate.symbol.startsWith('data:image')}" class="mb-3">
                <strong>Party Symbol:</strong><br>
                <img th:src="${candidate.symbol}" alt="Symbol" style="width: 80px; height: 80px; object-fit: contain;" class="mt-1">
            </div>
            
            <div class="mb-4">
                <h5>Manifesto</h5>
                <p class="p-3 bg-light rounded" th:text="${candidate.manifesto}"></p>
            </div>

            <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <h5 class="text-primary mb-0">AI Manifesto Neutral Summary</h5>
                    <div class="d-flex align-items-center">
                        <label for="langSelect" class="me-2 text-muted mb-0" style="font-size: 0.9rem;">Language:</label>
                        <select id="langSelect" class="form-select form-select-sm" style="width: auto;" onchange="location = this.value;">
                            <option th:value="@{'/voter/candidates/' + ${candidate.id}(lang='en')}" th:selected="${currentLang == 'en'}">English</option>
                            <option th:value="@{'/voter/candidates/' + ${candidate.id}(lang='hi')}" th:selected="${currentLang == 'hi'}">हिन्दी (Hindi)</option>
                            <option th:value="@{'/voter/candidates/' + ${candidate.id}(lang='bn')}" th:selected="${currentLang == 'bn'}">বাংলা (Bengali)</option>
                            <option th:value="@{'/voter/candidates/' + ${candidate.id}(lang='te')}" th:selected="${currentLang == 'te'}">తెలుగు (Telugu)</option>
                            <option th:value="@{'/voter/candidates/' + ${candidate.id}(lang='ta')}" th:selected="${currentLang == 'ta'}">தமிழ் (Tamil)</option>
                            <option th:value="@{'/voter/candidates/' + ${candidate.id}(lang='mr')}" th:selected="${currentLang == 'mr'}">मराठी (Marathi)</option>
                            <option th:value="@{'/voter/candidates/' + ${candidate.id}(lang='gu')}" th:selected="${currentLang == 'gu'}">ગુજરાતી (Gujarati)</option>
                            <option th:value="@{'/voter/candidates/' + ${candidate.id}(lang='kn')}" th:selected="${currentLang == 'kn'}">ಕನ್ನಡ (Kannada)</option>
                            <option th:value="@{'/voter/candidates/' + ${candidate.id}(lang='ml')}" th:selected="${currentLang == 'ml'}">മലയാളം (Malayalam)</option>
                            <option th:value="@{'/voter/candidates/' + ${candidate.id}(lang='pa')}" th:selected="${currentLang == 'pa'}">ਪੰਜਾਬੀ (Punjabi)</option>
                            <option th:value="@{'/voter/candidates/' + ${candidate.id}(lang='or')}" th:selected="${currentLang == 'or'}">ଓଡ଼ିଆ (Odia)</option>
                        </select>
                    </div>
                </div>
                <p class="p-3 border border-primary bg-white rounded" style="white-space: pre-line;" th:text="${summary}"></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
