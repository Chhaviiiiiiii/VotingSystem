<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | AI Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 mt-5">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Verify OTP</h2>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{/verify-otp}" th:object="${otpVerificationDto}" method="post">
                        <input type="hidden" th:field="*{email}">
                        <div class="mb-3">
                            <label for="otp" class="form-label">Enter 6-Digit OTP</label>
                            <input type="text" id="otp" th:field="*{otp}" class="form-control text-center fs-4" maxlength="6" required>
                            <div class="text-danger" th:if="${#fields.hasErrors('otp')}" th:errors="*{otp}"></div>
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">Verify OTP</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
