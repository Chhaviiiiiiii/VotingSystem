<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Form | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/admin/dashboard}">Admin Panel</a>
            <div class="d-flex">
                <a th:href="@{/admin/candidates}" class="btn btn-outline-light btn-sm me-2">Back to Candidates</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4 col-md-6">
        <div class="card shadow border-0">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0" th:text="${candidateId != null ? 'Edit Candidate' : 'Add Candidate'}"></h4>
            </div>
            <div class="card-body p-4">
                <form th:action="${candidateId != null ? '/admin/candidates/edit/' + candidateId : '/admin/candidates'}"
                    th:object="${candidateDto}" method="post" enctype="multipart/form-data">
                    <input type="hidden" th:field="*{symbol}">
                    <input type="hidden" th:field="*{profileImage}">
                    <div class="mb-3">
                        <label class="form-label">Candidate Name</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                        <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Party Name</label>
                        <input type="text" class="form-control" th:field="*{party}" required>
                        <div class="text-danger" th:if="${#fields.hasErrors('party')}" th:errors="*{party}"></div>
                    </div>
                    <div class="mb-3" th:if="${candidateId == null || !candidateDto.symbol.startsWith('data:image')}">
                        <label class="form-label">Symbol Name (Text representation)</label>
                        <input type="text" class="form-control" th:field="*{symbol}" required>
                        <div class="text-danger" th:if="${#fields.hasErrors('symbol')}" th:errors="*{symbol}"></div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Party Symbol Photo</label>
                        <input type="file" name="symbolImageFile" class="form-control" accept="image/*">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Manifesto (Stated promises)</label>
                        <textarea class="form-control" th:field="*{manifesto}" rows="5"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary"
                        th:text="${candidateId != null ? 'Save Changes' : 'Create Candidate'}"></button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
