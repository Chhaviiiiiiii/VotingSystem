<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>(function(){const saved=localStorage.getItem('theme');const theme=saved?saved:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',theme);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidate Details | VOTE INDIA</title>
    <!-- Bootstrap & Custom Design stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link th:href="@{/css/design-system.css}" rel="stylesheet">
    <link th:href="@{/css/app-shell.css}" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="app-sidebar">
            <div class="sidebar-brand">
                <span class="title">VOTE INDIA</span>
                <div class="subtitle">Administration</div>
            </div>
            <ul class="sidebar-menu">
                <li><a th:href="@{/admin/dashboard}" class="sidebar-link">Dashboard</a></li>
                <li><a th:href="@{/admin/candidates}" class="sidebar-link active">Candidates</a></li>
                <li><a th:href="@{/admin/elections}" class="sidebar-link">Elections</a></li>
                <li><a th:href="@{/admin/users}" class="sidebar-link">Users / Voters</a></li>
                <li><a th:href="@{/admin/statistics}" class="sidebar-link">Statistics</a></li>
            </ul>
            <div class="mt-auto pt-3 border-top" style="border-color: rgba(255,255,255,0.08) !important;">
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100 rounded-1">Logout</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="app-content">
            <header class="app-header">
                <button class="btn btn-dark d-lg-none" id="sidebarToggle">☰ Menu</button>
                <span class="header-welcome" th:text="${candidateId != null ? 'Edit Candidate Details' : 'Add New Candidate'}">Candidate Form</span>
            </header>

            <main class="app-body">
                <div class="mb-4">
                    <a th:href="@{/admin/candidates}" class="btn-editorial-secondary mb-3 py-2 px-3">&larr; Back to Candidates</a>
                    <h2 class="display-6 m-0" th:text="${candidateId != null ? 'Edit Candidate' : 'Add Candidate'}"></h2>
                    <p class="text-secondary mb-0">Fill in the official details of the running candidate.</p>
                </div>

                <div class="row">
                    <div class="col-lg-8">
                        <div class="card p-4">
                            <form th:action="${candidateId != null ? '/admin/candidates/edit/' + candidateId : '/admin/candidates'}"
                                th:object="${candidateDto}" method="post" enctype="multipart/form-data">
                                <input type="hidden" th:field="*{symbol}">
                                <input type="hidden" th:field="*{profileImage}">
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small text-uppercase tracking-wider">Candidate Name</label>
                                    <input type="text" class="form-control" th:field="*{name}" required>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small text-uppercase tracking-wider">Party Name</label>
                                    <input type="text" class="form-control" th:field="*{party}" required>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('party')}" th:errors="*{party}"></div>
                                </div>
                                
                                <div class="mb-3" th:if="${candidateId == null || !candidateDto.symbol.startsWith('data:image')}">
                                    <label class="form-label fw-semibold small text-uppercase tracking-wider">Symbol Name (Text representation)</label>
                                    <input type="text" class="form-control" th:field="*{symbol}" required>
                                    <div class="text-danger small mt-1" th:if="${#fields.hasErrors('symbol')}" th:errors="*{symbol}"></div>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label fw-semibold small text-uppercase tracking-wider">Party Symbol Photo</label>
                                    <input type="file" name="symbolImageFile" class="form-control" accept="image/*">
                                </div>
                                
                                <div class="mb-4">
                                    <label class="form-label fw-semibold small text-uppercase tracking-wider">Manifesto (Stated promises)</label>
                                    <textarea class="form-control" th:field="*{manifesto}" rows="6" placeholder="Describe the candidate's manifestos..."></textarea>
                                </div>
                                
                                <button type="submit" class="btn-editorial-primary px-5 py-3"
                                    th:text="${candidateId != null ? 'Save Changes' : 'Create Candidate'}"></button>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Hidden Footer reference to load theme styles globally -->
    <div th:replace="~{fragments/footer :: footer}" style="display: none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app-ui.js}"></script>
</body>
</html>
