<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Candidates | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin/dashboard}">Admin Panel</a>
        <div class="d-flex">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Candidates Management</h2>
        <a th:href="@{/admin/candidates/new}" class="btn btn-primary">Add New Candidate</a>
    </div>
    <hr>
    
    <table class="table table-bordered table-striped shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Party</th>
                <th>Symbol</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="candidate : ${candidates}">
                <td th:text="${candidate.name}"></td>
                <td th:text="${candidate.party}"></td>
                <td>
                    <span th:if="${candidate.symbol != null && !candidate.symbol.startsWith('data:image')}" th:text="${candidate.symbol}"></span>
                    <img th:if="${candidate.symbol != null && candidate.symbol.startsWith('data:image')}" th:src="${candidate.symbol}" alt="Symbol" style="width: 40px; height: 40px; object-fit: contain;">
                </td>
                <td>
                    <a th:href="@{/admin/candidates/edit/{id}(id=${candidate.id})}" class="btn btn-warning btn-sm">Edit</a>
                    <form th:action="@{/admin/candidates/delete/{id}(id=${candidate.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete/deactivate this candidate?')">Delete</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
