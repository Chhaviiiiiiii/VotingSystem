<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Elections | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin/dashboard}">Admin Panel</a>
        <div class="d-flex">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Elections Management</h2>
        <a th:href="@{/admin/elections/new}" class="btn btn-primary">Create New Election</a>
    </div>
    <hr>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-bordered table-striped shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Title</th>
                <th>Start Date</th>
                <th>End Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="election : ${elections}">
                <td th:text="${election.title}"></td>
                <td th:text="${election.startDate}"></td>
                <td th:text="${election.endDate}"></td>
                <td>
                    <span class="badge" th:classappend="${election.status == 'ACTIVE' ? 'bg-success' : (election.status == 'CLOSED' ? 'bg-danger' : 'bg-warning')}" th:text="${election.status}"></span>
                </td>
                <td>
                    <form th:if="${election.status == 'SCHEDULED'}" th:action="@{/admin/elections/start/{id}(id=${election.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-success btn-sm">Start Election</button>
                    </form>
                    <form th:if="${election.status == 'ACTIVE'}" th:action="@{/admin/elections/end/{id}(id=${election.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-danger btn-sm">End Election</button>
                    </form>
                    <a th:if="${election.status == 'CLOSED'}" th:href="@{/admin/results/{id}(id=${election.id})}" class="btn btn-info btn-sm text-white">View Results</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
