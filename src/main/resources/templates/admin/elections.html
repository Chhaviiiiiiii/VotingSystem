<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>(function(){const saved=localStorage.getItem('theme');const theme=saved?saved:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',theme);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Elections | VOTE INDIA</title>
    <!-- Bootstrap & Custom Design stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link th:href="@{/css/design-system.css}" rel="stylesheet">
    <link th:href="@{/css/app-shell.css}" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="app-sidebar">
            <div class="sidebar-brand">
                <span class="title">VOTE INDIA</span>
                <div class="subtitle">Administration</div>
            </div>
            <ul class="sidebar-menu">
                <li><a th:href="@{/admin/dashboard}" class="sidebar-link">Dashboard</a></li>
                <li><a th:href="@{/admin/candidates}" class="sidebar-link">Candidates</a></li>
                <li><a th:href="@{/admin/elections}" class="sidebar-link active">Elections</a></li>
                <li><a th:href="@{/admin/users}" class="sidebar-link">Users / Voters</a></li>
                <li><a th:href="@{/admin/statistics}" class="sidebar-link">Statistics</a></li>
            </ul>
            <div class="mt-auto pt-3 border-top" style="border-color: rgba(255,255,255,0.08) !important;">
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100 rounded-1">Logout</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="app-content">
            <header class="app-header">
                <button class="btn btn-dark d-lg-none" id="sidebarToggle">☰ Menu</button>
                <span class="header-welcome">Elections Management</span>
            </header>

            <main class="app-body">
                <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
                    <div>
                        <h2 class="display-6 m-0">Elections</h2>
                        <p class="text-secondary mb-0">Configure, trigger, and review election schedules.</p>
                    </div>
                    <a th:href="@{/admin/elections/new}" class="btn-editorial-primary">+ Create New Election</a>
                </div>

                <!-- Error Messages -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                <!-- Table Card -->
                <div class="card">
                    <div class="card-body p-0">
                        <table class="table table-striped align-middle mb-0">
                            <thead class="thead-editorial">
                                <tr>
                                    <th class="ps-4">Title</th>
                                    <th>Start Date</th>
                                    <th>End Date</th>
                                    <th>Status</th>
                                    <th class="text-end pe-4">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="election : ${elections}">
                                    <td class="ps-4 fw-bold" th:text="${election.title}"></td>
                                    <td th:text="${election.startDate}"></td>
                                    <td th:text="${election.endDate}"></td>
                                    <td>
                                        <span class="badge-editorial" th:classappend="${election.status == 'ACTIVE' ? 'badge-editorial-green' : (election.status == 'CLOSED' ? 'badge-editorial-danger' : 'badge-editorial-saffron')}" th:text="${election.status}"></span>
                                    </td>
                                    <td class="text-end pe-4">
                                        <form th:if="${election.status == 'SCHEDULED'}" th:action="@{/admin/elections/start/{id}(id=${election.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-outline-success btn-sm rounded-1 me-2 fw-semibold">Start Election</button>
                                        </form>
                                        <form th:if="${election.status == 'ACTIVE'}" th:action="@{/admin/elections/end/{id}(id=${election.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-outline-danger btn-sm rounded-1 me-2 fw-semibold">End Election</button>
                                        </form>
                                        <a th:if="${election.status == 'CLOSED'}" th:href="@{/admin/results/{id}(id=${election.id})}" class="btn btn-outline-dark btn-sm rounded-1 fw-semibold me-2">View Results</a>
                                        <form th:action="@{/admin/elections/delete/{id}(id=${election.id})}" method="post" class="d-inline" onsubmit="return confirm('Are you sure you want to delete this election? This will permanently delete all votes and voter records associated with it.');">
                                            <button type="submit" class="btn btn-outline-secondary btn-sm rounded-1 fw-semibold">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(elections)}">
                                    <td colspan="5" class="text-center py-5 text-muted">
                                        <span class="fs-1 d-block mb-3">📅</span>
                                        No elections created yet.
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Hidden Footer reference to load theme styles globally -->
    <div th:replace="~{fragments/footer :: footer}" style="display: none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app-ui.js}"></script>
</body>
</html>
