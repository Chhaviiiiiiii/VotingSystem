<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Results | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin/dashboard}">Admin Panel</a>
        <div class="d-flex">
            <a th:href="@{/admin/elections}" class="btn btn-outline-light btn-sm me-2">Back to Elections</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 th:text="${'Results: ' + election.title}"></h2>
    <h5 class="text-muted" th:text="${'Total Votes Cast: ' + totalVotes}"></h5>
    <hr>
    
    <table class="table table-bordered table-striped shadow-sm mt-3">
        <thead class="table-dark">
            <tr>
                <th>Candidate Name</th>
                <th>Party</th>
                <th>Votes</th>
                <th>Percentage</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="res : ${candidateResults}">
                <td th:text="${res.name}"></td>
                <td th:text="${res.party}"></td>
                <td th:text="${res.votes}"></td>
                <td th:text="${#numbers.formatDecimal(res.percentage, 1, 2) + '%'}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
