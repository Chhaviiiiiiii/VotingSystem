<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>(function(){const saved=localStorage.getItem('theme');const theme=saved?saved:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',theme);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Results | VOTE INDIA</title>
    <!-- Bootstrap & Custom Design stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link th:href="@{/css/design-system.css}" rel="stylesheet">
    <link th:href="@{/css/app-shell.css}" rel="stylesheet">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="app-sidebar">
            <div class="sidebar-brand">
                <span class="title">VOTE INDIA</span>
                <div class="subtitle">Administration</div>
            </div>
            <ul class="sidebar-menu">
                <li><a th:href="@{/admin/dashboard}" class="sidebar-link">Dashboard</a></li>
                <li><a th:href="@{/admin/candidates}" class="sidebar-link">Candidates</a></li>
                <li><a th:href="@{/admin/elections}" class="sidebar-link active">Elections</a></li>
                <li><a th:href="@{/admin/users}" class="sidebar-link">Users / Voters</a></li>
                <li><a th:href="@{/admin/statistics}" class="sidebar-link">Statistics</a></li>
            </ul>
            <div class="mt-auto pt-3 border-top" style="border-color: rgba(255,255,255,0.08) !important;">
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100 rounded-1">Logout</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="app-content">
            <header class="app-header">
                <button class="btn btn-dark d-lg-none" id="sidebarToggle">☰ Menu</button>
                <span class="header-welcome">Election Results</span>
            </header>

            <main class="app-body">
                <div class="mb-4">
                    <a th:href="@{/admin/elections}" class="btn-editorial-secondary mb-3 py-2 px-3">&larr; Back to Elections</a>
                    <h2 class="display-6 m-0" th:text="${'Results: ' + election.title}"></h2>
                    <p class="text-secondary mb-0" th:text="${'Total Votes Cast: ' + totalVotes}"></p>
                </div>

                <!-- Results Table Card -->
                <div class="card">
                    <div class="card-body p-0">
                        <table class="table table-striped align-middle mb-0">
                            <thead class="thead-editorial">
                                <tr>
                                    <th class="ps-4">Candidate Name</th>
                                    <th>Party</th>
                                    <th>Votes Count</th>
                                    <th class="text-end pe-4">Percentage</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="res : ${candidateResults}">
                                    <td class="ps-4 fw-bold" th:text="${res.name}"></td>
                                    <td>
                                        <span class="badge-editorial badge-editorial-saffron" th:text="${res.party}"></span>
                                    </td>
                                    <td th:text="${res.votes}"></td>
                                    <td class="text-end pe-4 fw-bold" th:text="${#numbers.formatDecimal(res.percentage, 1, 2) + '%'}"></td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Hidden Footer reference to load theme styles globally -->
    <div th:replace="~{fragments/footer :: footer}" style="display: none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app-ui.js}"></script>
</body>
</html>
