<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin/dashboard}">Admin Panel</a>
        <div class="d-flex">
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>Voters / Users Management</h2>
    <hr>
    
    <div class="row mb-3">
        <div class="col-md-6">
            <form th:action="@{/admin/users}" method="get">
                <div class="input-group">
                    <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Search by name, email, or Voter ID...">
                    <button type="submit" class="btn btn-primary">Search</button>
                </div>
            </form>
        </div>
    </div>

    <table class="table table-bordered table-striped shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>Voter ID</th>
                <th>Full Name</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Email Verified</th>
                <th>Account Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="voter : ${voters}">
                <td th:text="${voter.voterId}"></td>
                <td th:text="${voter.fullName}"></td>
                <td th:text="${voter.email}"></td>
                <td th:text="${voter.mobile}"></td>
                <td th:text="${voter.emailVerified ? 'YES' : 'NO'}"></td>
                <td th:text="${voter.status}"></td>
                <td>
                    <form th:action="@{/admin/users/toggle-status/{id}(id=${voter.id})}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-sm" th:classappend="${voter.status == 'ACTIVE' ? 'btn-danger' : 'btn-success'}" th:text="${voter.status == 'ACTIVE' ? 'Deactivate' : 'Activate'}"></button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
