<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>(function(){const saved=localStorage.getItem('theme');const theme=saved?saved:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',theme);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Statistics | VOTE INDIA</title>
    <!-- Bootstrap & Custom Design stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link th:href="@{/css/design-system.css}" rel="stylesheet">
    <link th:href="@{/css/app-shell.css}" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <div class="app-sidebar">
            <div class="sidebar-brand">
                <span class="title">VOTE INDIA</span>
                <div class="subtitle">Administration</div>
            </div>
            <ul class="sidebar-menu">
                <li><a th:href="@{/admin/dashboard}" class="sidebar-link">Dashboard</a></li>
                <li><a th:href="@{/admin/candidates}" class="sidebar-link">Candidates</a></li>
                <li><a th:href="@{/admin/elections}" class="sidebar-link">Elections</a></li>
                <li><a th:href="@{/admin/users}" class="sidebar-link">Users / Voters</a></li>
                <li><a th:href="@{/admin/statistics}" class="sidebar-link active">Statistics</a></li>
            </ul>
            <div class="mt-auto pt-3 border-top" style="border-color: rgba(255,255,255,0.08) !important;">
                <form th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm w-100 rounded-1">Logout</button>
                </form>
            </div>
        </div>

        <!-- Main Content -->
        <div class="app-content">
            <header class="app-header">
                <button class="btn btn-dark d-lg-none" id="sidebarToggle">☰ Menu</button>
                <span class="header-welcome">Election Analytics</span>
            </header>

            <main class="app-body">
                <div class="mb-4">
                    <h2 class="display-6 m-0">Statistics</h2>
                    <p class="text-secondary mb-0" th:text="${'Active Election: ' + electionTitle}"></p>
                </div>

                <!-- Empty State -->
                <div th:if="${chartLabels.isEmpty()}" class="card p-5 text-center">
                    <div class="card-body">
                        <span class="fs-1 d-block mb-3">📈</span>
                        <h4 class="h5 text-secondary">No statistics available because there is no active election or no votes have been cast.</h4>
                    </div>
                </div>

                <div th:unless="${chartLabels.isEmpty()}" class="row g-4">
                    <!-- Bar Chart Card -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">Votes Count (Bar Chart)</div>
                            <div class="card-body">
                                <canvas id="barChart"></canvas>
                            </div>
                        </div>
                    </div>
                    <!-- Pie Chart Card -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header">Vote Share % (Pie Chart)</div>
                            <div class="card-body">
                                <canvas id="pieChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Hidden Footer reference to load theme styles globally -->
    <div th:replace="~{fragments/footer :: footer}" style="display: none;"></div>

    <script th:unless="${chartLabels.isEmpty()}" th:inline="javascript">
        const labels = [[${chartLabels}]];
        const votesData = [[${chartVotes}]];
        const percentageData = [[${chartPercentages}]];
        
        // Theme aware chart color styles
        const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
        const textColor = isDark ? '#f3f4f6' : '#1c1d21';
        const gridColor = isDark ? 'rgba(243, 244, 246, 0.08)' : 'rgba(28, 29, 33, 0.08)';

        // Bar Chart
        const ctxBar = document.getElementById('barChart').getContext('2d');
        new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Votes Count',
                    data: votesData,
                    backgroundColor: 'rgba(217, 119, 6, 0.6)',
                    borderColor: '#d97706',
                    borderWidth: 1
                }]
            },
            options: {
                plugins: {
                    legend: { labels: { color: textColor } }
                },
                scales: {
                    x: {
                        ticks: { color: textColor },
                        grid: { color: gridColor }
                    },
                    y: {
                        beginAtZero: true,
                        ticks: { color: textColor },
                        grid: { color: gridColor }
                    }
                }
            }
        });

        // Pie Chart
        const ctxPie = document.getElementById('pieChart').getContext('2d');
        new Chart(ctxPie, {
            type: 'pie',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Vote Share %',
                    data: percentageData,
                    backgroundColor: [
                        'rgba(217, 119, 6, 0.7)',
                        'rgba(21, 128, 61, 0.7)',
                        'rgba(18, 19, 22, 0.7)',
                        'rgba(94, 96, 102, 0.7)',
                        'rgba(142, 144, 150, 0.7)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                plugins: {
                    legend: { labels: { color: textColor } }
                }
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app-ui.js}"></script>
</body>
</html>
