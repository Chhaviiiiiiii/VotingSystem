<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Election | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/admin/dashboard}">Admin Panel</a>
        <div class="d-flex">
            <a th:href="@{/admin/elections}" class="btn btn-outline-light btn-sm me-2">Back to Elections</a>
        </div>
    </div>
</nav>

<div class="container mt-4 col-md-6">
    <div class="card shadow border-0">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Create New Election</h4>
        </div>
        <div class="card-body p-4">
            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/admin/elections}" th:object="${election}" method="post">
                <div class="mb-3">
                    <label class="form-label">Election Title</label>
                    <input type="text" class="form-control" th:field="*{title}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" th:field="*{description}" rows="3"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Start Date & Time</label>
                    <input type="datetime-local" class="form-control" th:field="*{startDate}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">End Date & Time</label>
                    <input type="datetime-local" class="form-control" th:field="*{endDate}" required>
                </div>
                <button type="submit" class="btn btn-primary">Create Election</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
