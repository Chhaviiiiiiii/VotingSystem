<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 mt-5">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">Login</h2>

                        <div th:if="${param.error}" class="alert alert-danger"
                            th:text="${session.SPRING_SECURITY_LAST_EXCEPTION != null ? session.SPRING_SECURITY_LAST_EXCEPTION.message : 'Invalid email or password.'}">
                        </div>

                        <div th:if="${param.logout}" class="alert alert-success">
                            You have been logged out successfully.
                        </div>

                        <div th:if="${success}" class="alert alert-success" th:text="${success}">
                        </div>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}">
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" id="email" name="email" class="form-control"
                                    placeholder="name@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" name="password" class="form-control"
                                    placeholder="Enter password" required>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary">Login</button>
                            </div>
                        </form>

                        <div class="text-center mt-3">
                            <a th:href="@{/forgot-password}">Forgot Password?</a>
                        </div>
                        <hr>
                        <div class="text-center">
                            Don't have an account? <a th:href="@{/register}">Register here</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
