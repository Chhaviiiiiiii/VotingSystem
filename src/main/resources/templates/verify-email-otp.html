<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email OTP | AI Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow border-0 mt-5">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Verify Email OTP</h2>
                    
                    <p class="text-muted text-center mb-4">
                        A verification OTP has been sent to your email: <br>
                        <strong th:text="${email}">user@example.com</strong>
                    </p>

                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                    <form th:action="@{/verify-email-otp}" method="post">
                        <input type="hidden" name="email" th:value="${email}">
                        <div class="mb-3">
                            <label for="otp" class="form-label">Enter 6-Digit OTP</label>
                            <input type="text" id="otp" name="otp" class="form-control text-center fs-4" maxlength="6" placeholder="******" required>
                        </div>
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary">Verify OTP</button>
                        </div>
                    </form>

                    <form th:action="@{/resend-verification-otp}" method="post" class="text-center mt-3">
                        <input type="hidden" name="email" th:value="${email}">
                        <span>Didn't receive the OTP?</span>
                        <button type="submit" class="btn btn-link p-0 m-0 align-baseline">Resend OTP</button>
                    </form>
                    
                    <hr>
                    <div class="text-center">
                        Back to <a th:href="@{/login}">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
