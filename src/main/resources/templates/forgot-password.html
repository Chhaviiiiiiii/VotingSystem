<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>(function(){const saved=localStorage.getItem('theme');const theme=saved?saved:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',theme);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | VOTE INDIA</title>
    <!-- Bootstrap & Custom Design stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <link th:href="@{/css/design-system.css}" rel="stylesheet">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <!-- Left Side: Visual Backdrop -->
        <div class="auth-visual-panel">
            <div class="auth-visual-brand">
                <span class="logo-title">VOTE INDIA</span>
                <div class="logo-subtitle">Digital Voting Portal</div>
            </div>
            
            <div class="auth-visual-quote">
                <p class="quote-body">"Recover your account securely."</p>
                <div class="quote-sub">Identity Verification</div>
            </div>
            
            <div class="small text-white-50">
                Secure Registration • OTP Verification • Enforced Single Vote
            </div>
        </div>

        <!-- Right Side: Form Panel -->
        <div class="auth-form-panel">
            <a th:href="@{/login}" class="auth-back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Login
            </a>

            <div class="auth-form-box">
                <div class="auth-header text-start">
                    <h2>Forgot Password</h2>
                    <p>Enter your registered email to request a secure password-reset OTP code.</p>
                </div>

                <!-- Alerts -->
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <form th:action="@{/forgot-password}" th:object="${forgotPasswordDto}" method="post">
                    <div class="mb-4">
                        <label for="email" class="form-label fw-bold small text-uppercase tracking-wider">Email Address</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control" placeholder="name@example.com" required>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    <button type="submit" class="btn-editorial-primary w-100 py-3 mb-4">Request OTP &rarr;</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Hidden Footer reference to load theme styles globally -->
    <div th:replace="~{fragments/footer :: footer}" style="display: none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app-ui.js}"></script>
</body>
</html>
