<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error | AI Voting System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 mt-5 text-center">
                <div class="card-body p-5">
                    <h1 class="text-danger mb-3">Oops! Something went wrong</h1>
                    <p class="lead mb-4" th:text="${error != null ? error : 'An unexpected error occurred.'}"></p>
                    <a th:href="@{/login}" class="btn btn-primary">Go to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
