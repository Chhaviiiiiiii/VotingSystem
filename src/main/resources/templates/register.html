<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <script>(function(){const saved=localStorage.getItem('theme');const theme=saved?saved:(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-bs-theme',theme);})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | VOTE INDIA</title>
    <!-- Bootstrap & Custom Design stylesheets -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <link th:href="@{/css/design-system.css}" rel="stylesheet">
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body>

    <div class="auth-container">
        <!-- Left Side: Visual Backdrop -->
        <div class="auth-visual-panel">
            <div class="auth-visual-brand">
                <span class="logo-title">VOTE INDIA</span>
                <div class="logo-subtitle">Digital Voting Portal</div>
            </div>
            
            <div class="auth-visual-quote">
                <p class="quote-body">"Democracy, made more accessible."</p>
                <div class="quote-sub">Verified & Secure</div>
            </div>
            
            <div class="small text-white-50">
                Secure Registration • OTP Verification • Enforced Single Vote
            </div>
        </div>

        <!-- Right Side: Register Form -->
        <div class="auth-form-panel">
            <a th:href="@{/}" class="auth-back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Back to Home
            </a>

            <div class="auth-form-box" style="max-width: 580px;">
                <div class="auth-header text-start">
                    <h2>Voter Registration</h2>
                    <p>Provide accurate registration information to sign up and activate your account.</p>
                </div>

                <!-- Alert Blocks -->
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>

                <form th:action="@{/register}" th:object="${user}" method="post" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-uppercase tracking-wider">Full Name</label>
                            <input type="text" class="form-control" th:field="*{fullName}" placeholder="Enter name" required autocomplete="name">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-uppercase tracking-wider">Email Address</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="name@example.com" required autocomplete="email">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-uppercase tracking-wider">Mobile Number</label>
                            <input type="text" class="form-control" th:field="*{mobile}" maxlength="10" placeholder="10-digit mobile" required autocomplete="tel">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('mobile')}" th:errors="*{mobile}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-uppercase tracking-wider">Voter ID</label>
                            <input type="text" class="form-control" th:field="*{voterId}" maxlength="10" placeholder="Example: ABC1234567" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('voterId')}" th:errors="*{voterId}"></div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-uppercase tracking-wider">Date of Birth</label>
                            <input type="date" class="form-control" th:field="*{dateOfBirth}" required>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold small text-uppercase tracking-wider">Profile Photo (Optional)</label>
                            <input type="file" name="profileImageFile" class="form-control" accept="image/*">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold small text-uppercase tracking-wider">Secure Password</label>
                        <input type="password" class="form-control" th:field="*{password}" placeholder="Minimum 8 characters" required autocomplete="new-password">
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <button type="submit" class="btn-editorial-primary w-100 py-3 mb-4">Register &rarr;</button>
                </form>

                <div class="text-center">
                    Already registered? <a th:href="@{/login}" class="fw-bold text-decoration-none text-primary">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden Footer reference to load theme styles globally -->
    <div th:replace="~{fragments/footer :: footer}" style="display: none;"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/app-ui.js}"></script>
</body>
</html>
