<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | AI Voting System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div class="container mt-5 mb-5">

    <div class="row justify-content-center">

        <div class="col-md-7 col-lg-6">

            <div class="card shadow">

                <div class="card-body p-4">

                    <h2 class="text-center mb-4">
                        Voter Registration
                    </h2>

                    <div th:if="${success}"
                         class="alert alert-success"
                         th:text="${success}">
                    </div>

                    <div th:if="${error}"
                         class="alert alert-danger"
                         th:text="${error}">
                    </div>

                    <form th:action="@{/register}"
                          th:object="${user}"
                          method="post"
                          enctype="multipart/form-data">

                        <div class="mb-3">

                            <label class="form-label">
                                Full Name
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{fullName}"
                                   placeholder="Enter your full name">

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('fullName')}"
                                 th:errors="*{fullName}">
                            </div>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Email
                            </label>

                            <input type="email"
                                   class="form-control"
                                   th:field="*{email}"
                                   placeholder="Enter your email">

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}">
                            </div>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Mobile Number
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{mobile}"
                                   maxlength="10"
                                   placeholder="Enter 10 digit mobile number">

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('mobile')}"
                                 th:errors="*{mobile}">
                            </div>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Voter ID
                            </label>

                            <input type="text"
                                   class="form-control"
                                   th:field="*{voterId}"
                                   maxlength="10"
                                   placeholder="Example: ABC1234567">

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('voterId')}"
                                 th:errors="*{voterId}">
                            </div>

                        </div>


                        <div class="mb-3">

                            <label class="form-label">
                                Date of Birth
                            </label>

                            <input type="date"
                                   class="form-control"
                                   th:field="*{dateOfBirth}">

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('dateOfBirth')}"
                                 th:errors="*{dateOfBirth}">
                            </div>

                        </div>


                        <div class="mb-3">
                            <label class="form-label">Profile Image (Optional)</label>
                            <input type="file" name="profileImageFile" class="form-control" accept="image/*">
                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   class="form-control"
                                   th:field="*{password}"
                                   placeholder="Minimum 8 characters">

                            <div class="text-danger"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}">
                            </div>

                        </div>


                        <div class="d-grid">

                            <button type="submit"
                                    class="btn btn-primary">

                                Register

                            </button>

                        </div>

                    </form>


                    <div class="text-center mt-3">

                        Already registered?

                        <a th:href="@{/login}">
                            Login here
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
